<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <linearGradient id="dm1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#da3633"/>
      <stop offset="100%" style="stop-color:#b62324"/>
    </linearGradient>
    <linearGradient id="dm2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a371f7"/>
      <stop offset="100%" style="stop-color:#8250df"/>
    </linearGradient>
    <linearGradient id="dm3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#29903b"/>
    </linearGradient>
    <linearGradient id="dm4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0883e"/>
      <stop offset="100%" style="stop-color:#d9762d"/>
    </linearGradient>
  </defs>
  <rect width="500" height="300" fill="url(#bg2)"/>
  
  <!-- Central LLM icon -->
  <rect x="195" y="80" width="110" height="60" rx="30" fill="url(#llmGrad)" opacity="0.95"/>
  <text x="250" y="110" text-anchor="middle" fill="white" font-size="13" font-family="Arial,sans-serif" font-weight="bold">Large Language</text>
  <text x="250" y="128" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="13" font-family="Arial,sans-serif" font-weight="bold">Model</text>
  
  <!-- Connecting arrows to data mining nodes -->
  <line x1="195" y1="110" x2="90" y2="195" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="90,195 100,190 95,200" fill="rgba(255,255,255,0.25)"/>
  
  <line x1="305" y1="110" x2="410" y2="195" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="410,195 400,190 405,200" fill="rgba(255,255,255,0.25)"/>
  
  <line x1="220" y1="140" x2="180" y2="240" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="180,240 186,232 184,244" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Data Mining Nodes -->
  <rect x="30" y="180" width="120" height="40" rx="8" fill="url(#dm1)"/>
  <text x="90" y="205" text-anchor="middle" fill="white" font-size="12" font-family="Arial,sans-serif" font-weight="bold">Pattern Discovery</text>
  
  <rect x="350" y="180" width="120" height="40" rx="8" fill="url(#dm2)"/>
  <text x="410" y="205" text-anchor="middle" fill="white" font-size="12" font-family="Arial,sans-serif" font-weight="bold">Graph Mining</text>
  
  <rect x="120" y="240" width="120" height="40" rx="8" fill="url(#dm3)"/>
  <text x="180" y="265" text-anchor="middle" fill="white" font-size="12" font-family="Arial,sans-serif" font-weight="bold">Knowledge Graphs</text>
  
  <!-- Bottom label -->
  <text x="250" y="290" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11" font-family="Arial,sans-serif">Advancing Data Mining with LLMs</text>
</svg>
